<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta property="og:locale" content="ko_KR">
  <meta property="og:site_name" content="만세진 핑계 생성기">

  <meta name="twitter:title" content="지각 핑계 생성기 🏃‍♂️">
  <meta name="twitter:description" content="오늘 지각했어? 클릭 한 번으로 그럴듯한 핑계를 만들어드려요!">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f14;
      --card: #1a1a24;
      --accent: #ff6b4a;
      --accent2: #ffd166;
      --text: #f0f0f5;
      --muted: #8888a0;
      --radius: 20px;
    }

    html {
      -webkit-text-size-adjust: 100%;
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: transparent;
      color: var(--text);
      min-height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px calc(40px + env(safe-area-inset-bottom, 0px));
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 120% 80% at 20% 0%, rgba(255,107,74,.18) 0%, transparent 55%),
        radial-gradient(ellipse 120% 80% at 80% 100%, rgba(255,209,102,.12) 0%, transparent 55%),
        radial-gradient(ellipse 80% 50% at 50% 50%, rgba(100,180,255,.04) 0%, transparent 70%);
      pointer-events: none;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    .emoji-hero {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 12px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 24px;
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .section-label + .tabs-row { margin-bottom: 20px; }

    .tabs-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tab {
      flex: 1;
      min-width: calc(33% - 6px);
      min-height: 44px;
      padding: 12px 8px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: all .2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      appearance: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .tab.active {
      background: rgba(255,107,74,.15);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 700;
    }

    .situation-tab.active {
      background: rgba(100,180,255,.15);
      border-color: #64b4ff;
      color: #64b4ff;
    }

    .category-tabs .tab {
      min-width: calc(50% - 4px);
    }

    .excuse-box {
      background: rgba(255,255,255,.04);
      border-radius: 16px;
      padding: 24px 20px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.1rem;
      line-height: 1.7;
      font-weight: 500;
      border: 1px dashed rgba(255,255,255,.1);
      transition: opacity .3s;
      word-break: keep-all;
      touch-action: manipulation;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .excuse-box.has-excuse {
      flex-direction: column;
    }

    .excuse-box.has-excuse::after {
      content: '탭하면 복사';
      display: block;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 12px;
      font-weight: 400;
    }

    .excuse-box.fade { opacity: 0; }

    .excuse-box .placeholder {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 400;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      width: 100%;
      min-height: 52px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform .15s, opacity .15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      appearance: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #ff8f6b);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255,107,74,.4);
    }

    .btn-secondary {
      background: rgba(255,255,255,.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.12);
    }

    .btn-share {
      background: linear-gradient(135deg, #fee500, #f5d800);
      color: #3c1e1e;
      font-weight: 800;
    }

    .toast {
      position: fixed;
      bottom: calc(32px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2a2a38;
      color: var(--text);
      padding: 12px 20px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 100;
      max-width: calc(100vw - 32px);
      text-align: center;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    .file-warning {
      display: none;
      width: 100%;
      max-width: 420px;
      background: rgba(255,209,102,.12);
      border: 1px solid rgba(255,209,102,.3);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
      font-size: 0.82rem;
      line-height: 1.6;
      color: var(--accent2);
    }

    .file-warning.show { display: block; }

    footer {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 1.6;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 16px;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent2);
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .app-nav {
      display: flex;
      gap: 6px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 20px;
      background: rgba(255,255,255,.04);
      padding: 6px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.06);
    }

    .app-nav-btn {
      flex: 1;
      min-width: 0;
      min-height: 44px;
      padding: 10px 4px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .app-nav-btn.active {
      background: var(--card);
      color: var(--text);
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .form-field {
      margin-bottom: 18px;
    }

    .form-field label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .form-field label span {
      color: var(--accent2);
      font-size: 0.8rem;
    }

    .form-field input[type="range"] {
      width: 100%;
      height: 6px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .form-field input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
    }

    .hair-result-box {
      background: rgba(255,255,255,.04);
      border-radius: 16px;
      padding: 24px 20px;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px dashed rgba(255,255,255,.1);
      transition: opacity .3s;
    }

    .hair-result-box.fade { opacity: 0; }

    .hair-result-box .placeholder {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .hair-percent {
      font-size: 3.2rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #ff6b4a, #ffd166);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hair-verdict {
      margin-top: 12px;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
      word-break: keep-all;
    }

    .hair-scan {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    .progress-bar-wrap {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,.06);
      border-radius: 99px;
      margin-top: 16px;
      overflow: hidden;
      display: none;
    }

    .progress-bar-wrap.show { display: block; }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width .08s linear;
    }

    .quiz-progress {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
    }

    .quiz-dots {
      display: flex;
      gap: 6px;
    }

    .quiz-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
      transition: background .2s, transform .2s;
    }

    .quiz-dot.done { background: var(--accent2); }
    .quiz-dot.current { background: var(--accent); transform: scale(1.25); }

    .quiz-question-box {
      background: rgba(255,255,255,.04);
      border-radius: 16px;
      padding: 28px 20px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.05rem;
      line-height: 1.65;
      font-weight: 600;
      border: 1px dashed rgba(255,255,255,.1);
      word-break: keep-all;
      margin-bottom: 16px;
    }

    .yn-btns {
      display: flex;
      gap: 10px;
    }

    .yn-btn {
      flex: 1;
      min-height: 56px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all .15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .yn-btn:active { transform: scale(.97); }

    .yn-btn.yes:hover, .yn-btn.yes:active {
      background: rgba(255,107,74,.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .yn-btn.no:hover, .yn-btn.no:active {
      background: rgba(100,220,130,.15);
      border-color: #64dc82;
      color: #64dc82;
    }

    .poker-result-box {
      text-align: center;
      padding: 20px 0;
    }

    .poker-verdict {
      font-size: 2.8rem;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -1px;
    }

    .poker-verdict.call {
      color: #64dc82;
      text-shadow: 0 0 40px rgba(100,220,130,.35);
    }

    .poker-verdict.fold {
      color: #ff6b4a;
      text-shadow: 0 0 40px rgba(255,107,74,.35);
    }

    .poker-reason {
      margin-top: 14px;
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--muted);
      word-break: keep-all;
    }

    .poker-score {
      margin-top: 12px;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="file-warning" id="fileWarning">
    ⚠️ 파일로 열면 일부 기능이 안 될 수 있어요.<br>
    <strong>사파리·크롬</strong>에서 열거나, 웹에 올린 링크로 접속하세요.
  </div>

  <nav class="app-nav" id="appNav">
    <button type="button" class="app-nav-btn active" data-app="excuse">🏃 핑계</button>
    <button type="button" class="app-nav-btn" data-app="hair">🧑‍🦲 탈모</button>
    <button type="button" class="app-nav-btn" data-app="poker">🃏 콜말콜</button>
  </nav>

  <header id="appHeader">
    <div class="emoji-hero" id="headerEmoji">🏃‍♂️💨</div>
    <h1 id="headerTitle">지각 핑계 생성기</h1>
    <p class="subtitle" id="headerSubtitle">오늘도 늦었어? 괜찮아, 핑계는 내가 만들어줄게</p>
  </header>

  <main class="card panel active" id="panelExcuse">
    <p class="section-label">어떤 상황이에요?</p>
    <div class="tabs-row" id="situationTabs">
      <button type="button" class="tab situation-tab active" data-situation="work">💼 회사 지각</button>
      <button type="button" class="tab situation-tab" data-situation="meeting">📊 중요한 미팅</button>
      <button type="button" class="tab situation-tab" data-situation="friend">🍻 친구 약속</button>
    </div>

    <p class="section-label">핑계 스타일</p>
    <div class="tabs-row category-tabs" id="tabs">
      <button type="button" class="tab active" data-cat="all">🎲 전체</button>
      <button type="button" class="tab" data-cat="traffic">🚗 교통</button>
      <button type="button" class="tab" data-cat="health">🤒 건강</button>
      <button type="button" class="tab" data-cat="life">🏠 일상</button>
      <button type="button" class="tab" data-cat="tech">📱 기술</button>
      <button type="button" class="tab" data-cat="absurd">🤡 어이없는</button>
    </div>

    <div class="excuse-box" id="excuseBox" role="button" tabindex="0" aria-label="핑계 복사">
      <span class="placeholder">아래 버튼을 눌러 핑계를 생성하세요!</span>
    </div>

    <div class="btn-group">
      <button type="button" class="btn btn-primary" id="generateBtn">✨ 핑계 생성하기</button>
      <button type="button" class="btn btn-secondary" id="copyBtn" style="display:none">📋 복사하기</button>
      <button type="button" class="btn btn-share" id="shareBtn">💬 친구에게 공유하기</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="countNum">0</div>
        <div class="stat-label">생성한 핑계</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="totalExcuses">0</div>
        <div class="stat-label">총 핑계 수</div>
      </div>
    </div>
  </main>

  <main class="card panel" id="panelHair">
    <p class="section-label">대상자 정보</p>
    <div class="form-field">
      <label for="hairName">이름</label>
      <input type="text" id="hairName" value="" maxlength="20" placeholder="이름 입력 (선택)">
    </div>

    <div class="form-field">
      <label for="hairAge">나이 <span id="hairAgeVal">27세</span></label>
      <input type="range" id="hairAge" min="1" max="80" value="27">
    </div>

    <div class="form-field">
      <label for="hairStress">스트레스 <span id="hairStressVal">보통</span></label>
      <input type="range" id="hairStress" min="0" max="100" value="50">
    </div>

    <div class="form-field">
      <label for="hairCoffee">하루 커피 <span id="hairCoffeeVal">2잔</span></label>
      <input type="range" id="hairCoffee" min="0" max="10" value="2">
    </div>

    <div class="form-field">
      <label for="hairSleep">수면 시간 <span id="hairSleepVal">6시간</span></label>
      <input type="range" id="hairSleep" min="0" max="12" value="6">
    </div>

    <div class="form-field">
      <label for="hairGenetics">가족 탈모 유전력 <span id="hairGeneticsVal">없음</span></label>
      <input type="range" id="hairGenetics" min="0" max="100" value="0">
    </div>

    <div class="hair-result-box" id="hairResultBox">
      <span class="placeholder">아래 버튼을 눌러 과학적으로 분석하세요</span>
    </div>

    <div class="progress-bar-wrap" id="hairProgressWrap">
      <div class="progress-bar-fill" id="hairProgressFill"></div>
    </div>
    <p class="hair-scan" id="hairScan"></p>

    <div class="btn-group">
      <button type="button" class="btn btn-primary" id="hairCalcBtn">🔬 탈모 확률 분석하기</button>
      <button type="button" class="btn btn-secondary" id="hairCopyBtn" style="display:none">📋 결과 복사하기</button>
      <button type="button" class="btn btn-share" id="hairShareBtn">💬 결과 공유하기</button>
    </div>
  </main>

  <main class="card panel" id="panelPoker">
    <div id="pokerQuiz">
      <div class="quiz-progress">
        <span id="pokerStepLabel">질문 1 / 5</span>
        <div class="quiz-dots" id="pokerDots"></div>
      </div>
      <div class="quiz-question-box" id="pokerQuestion"></div>
      <div class="yn-btns">
        <button type="button" class="yn-btn yes" id="pokerYes">예 😰</button>
        <button type="button" class="yn-btn no" id="pokerNo">아니오 😎</button>
      </div>
    </div>

    <div id="pokerResult" style="display:none">
      <div class="poker-result-box">
        <div class="poker-verdict" id="pokerVerdict"></div>
        <p class="poker-reason" id="pokerReason"></p>
        <p class="poker-score" id="pokerScore"></p>
      </div>
      <div class="btn-group">
        <button type="button" class="btn btn-secondary" id="pokerCopyBtn">📋 결과 복사하기</button>
        <button type="button" class="btn btn-share" id="pokerShareBtn">💬 톡방에 공유하기</button>
        <button type="button" class="btn btn-primary" id="pokerRetryBtn">🔄 다시 판단하기</button>
      </div>
    </div>
  </main>

  <footer id="appFooter">
    <p id="footerLine1">※ 본 서비스는 핑계의 진실성을 보장하지 않습니다 😇</p>
    <p id="footerLine2">지각하지 않는 것이 최고의 핑계입니다</p>
  </footer>

      let touched = false;
      el.addEventListener('touchend', function (e) {
        touched = true;
        e.preventDefault();
        handler(e);
        setTimeout(() => { touched = false; }, 400);
      }, { passive: false });
      el.addEventListener('click', function (e) {
        if (touched) return;
        handler(e);
      });

      const pool = getPool();

      do {

      currentExcuse = excuse;

        excuseBox.classList.add('has-excuse');

    function copyToClipboard(text) {
      if (!text) return false;

      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text).then(() => true).catch(() => fallbackCopy(text));
      }
      return Promise.resolve(fallbackCopy(text));
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.cssText = 'position:fixed;top:0;left:0;width:2em;height:2em;padding:0;border:none;outline:none;box-shadow:none;background:transparent;font-size:16px;';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, text.length);
      let ok = false;
      try { ok = document.execCommand('copy'); } catch {}
      document.body.removeChild(ta);
      return ok;
    }

      'DHT 호르몬 수치 분석 중...',
      '정수리 위성 사진 로딩 중...',
      '두피 DNA 시퀀싱 중...',
      '탈모 유전자 17번 염색체 확인 중...',
      '최종 결과 산출 중...',
    ];

    const verdicts = [
      '이마 라인이 후퇴할 준비를 마쳤습니다',
      '미래의 당신이 대머리를 쓰고 계십니다',
      '샴푸 광고 모델은 포기하세요',
      '모자 업계에 희소식입니다',
      '정수리에 바람이 통할 예정입니다',
      '탈모 샴푸 주식 매수를 권장합니다',
      '머리카락 한 올 한 올이 이별 통보 중입니다',
      '미용실에서 "숱이 좀..." 소리 들을 각입니다',
    ];

    function getHairPercent() {
      return (99 + Math.random() * 0.99).toFixed(1);
    }

    function calcHair() {
      const name = document.getElementById('hairName').value.trim() || '당신';
      const btn = document.getElementById('hairCalcBtn');
      btn.disabled = true;
      hairCopyBtn.style.display = 'none';
      hairProgressWrap.classList.add('show');
      hairProgressFill.style.width = '0%';
      hairResultBox.classList.add('fade');
      hairResultBox.innerHTML = '<span class="placeholder">분석 중...</span>';

      let step = 0;
      hairScan.textContent = scanSteps[0];

      const scanInterval = setInterval(() => {
        step++;
        if (step < scanSteps.length) hairScan.textContent = scanSteps[step];
      }, 400);

      let progress = 0;
      const progressInterval = setInterval(() => {
        progress = Math.min(99, progress + Math.random() * 12 + 3);
        hairProgressFill.style.width = progress + '%';
      }, 120);

      setTimeout(() => {
        clearInterval(scanInterval);
        clearInterval(progressInterval);
        const percent = getHairPercent();
        const verdict = verdicts[Math.floor(Math.random() * verdicts.length)];
        hairProgressFill.style.width = percent + '%';
        hairScan.textContent = '✅ 분석 완료 (오차범위 ±0.01%)';

        hairResultText = `${name}님 탈모 확률: ${percent}%\n${verdict}\n\n탈모 확률 계산기 👇`;
        hairResultBox.innerHTML = `<div class="hair-percent">${percent}%</div><div class="hair-verdict"><strong>${name}</strong>님의 탈모 확률: <strong>${percent}%</strong><br><span style="color:var(--muted);font-size:0.85rem">${verdict}</span></div>`;
        hairResultBox.classList.remove('fade');
        hairCopyBtn.style.display = 'block';
        btn.disabled = false;
      }, 2800);
    }

    function copyHairResult() {
      if (!hairResultText) return;
      const url = location.protocol === 'file:' ? '' : location.origin + location.pathname + '?app=hair';
      const text = url ? hairResultText + '\n' + url : hairResultText;
      copyToClipboard(text).then((ok) => {
        showToast(ok ? '📋 복사 완료!' : '📋 길게 눌러서 복사해 주세요');
      });
    }

    function shareHair() {
      const name = document.getElementById('hairName').value.trim() || '당신';
      const text = hairResultText
        ? hairResultText
        : `${name}님 탈모 확률 측정해봤는데 ㅋㅋㅋ 너도 해봐`;
      const url = location.protocol === 'file:' ? '' : location.origin + location.pathname + '?app=hair';
      const shareText = url ? text + '\n' + url : text;

      if (navigator.share) {
        navigator.share({ title: '탈모 확률 계산기 🧑‍🦲', text: shareText }).catch((e) => {
          if (e.name !== 'AbortError') copyToClipboard(shareText).then(() => showToast('📋 복사됨! 카톡에 붙여넣기 하세요'));
        });
        return;
      }
      copyToClipboard(shareText).then((ok) => {
        showToast(ok ? '📋 복사됨! 카톡에 붙여넣기 하세요' : shareText);
      });
    }

    bindTap(document.getElementById('hairCalcBtn'), calcHair);
    bindTap(hairCopyBtn, copyHairResult);
    bindTap(document.getElementById('hairShareBtn'), shareHair);

    // ── 콜 할까 말까? ──
    const pokerQuestions = [
      '상대방이 오늘따라 의심스럽습니까?',
      '레이즈 타이밍이 평소와 다릅니까?',
      '보드 텍스처가 상대 핸드랑 잘 맞아 보입니까?',
      '팟 사이즈 대비 베팅이 과하게 큽니까?',
      '상대가 평소보다 말이 많거나 적습니까?',
    ];

    const callReasons = [
      '상대가 블러핑일 확률 127%입니다 (수학적으로)',
      '이 팟, 안 가져가면 평생 후회합니다',
      '콜 한 번이면 인생이 바뀝니다 (아마)',
      '상대도 떨고 있을 겁니다. 당당하게 가세요',
      '오늘은 운이 당신 편입니다. probably',
      '핸드레인지가 넓다면 콜이 정답입니다',
    ];

    const foldReasons = [
      '상대 눈빛이 너무 편안합니다. 핸드 있음',
      '이 보드에서 콜하면 지갑이 울 겁니다',
      '폴드가 실력입니다. 오늘은 접으세요',
      '상대가 웃고 있습니다. 그건 좋은 신호가 아닙니다',
      '의심 포인트가 너무 많습니다. 다음 기회에',
      '톡방에 "콜?" 올리기 전에 이미 답은 폴드입니다',
    ];

    let pokerStep = 0;
    let pokerSuspicion = 0;
    let pokerResultText = '';

    const pokerQuiz = document.getElementById('pokerQuiz');
    const pokerResult = document.getElementById('pokerResult');
    const pokerQuestion = document.getElementById('pokerQuestion');
    const pokerDots = document.getElementById('pokerDots');
    const pokerStepLabel = document.getElementById('pokerStepLabel');

    function renderPokerDots() {
      pokerDots.innerHTML = pokerQuestions.map((_, i) => {
        let cls = 'quiz-dot';
        if (i < pokerStep) cls += ' done';
        else if (i === pokerStep) cls += ' current';
        return `<span class="${cls}"></span>`;
      }).join('');
    }

    function showPokerQuestion() {
      pokerQuiz.style.display = 'block';
      pokerResult.style.display = 'none';
      pokerQuestion.textContent = pokerQuestions[pokerStep];
      pokerStepLabel.textContent = `질문 ${pokerStep + 1} / ${pokerQuestions.length}`;
      renderPokerDots();
    }

    function answerPoker(suspicious) {
      if (suspicious) pokerSuspicion++;
      pokerStep++;
      if (pokerStep < pokerQuestions.length) {
        showPokerQuestion();
        return;
      }
      showPokerVerdict();
    }

    function showPokerVerdict() {
      const fold = pokerSuspicion >= 3;
      const verdict = fold ? 'FOLD 🙅' : 'CALL ✅';
      const reasons = fold ? foldReasons : callReasons;
      const reason = reasons[Math.floor(Math.random() * reasons.length)];
      const verdictEl = document.getElementById('pokerVerdict');
      const cls = fold ? 'fold' : 'call';

      verdictEl.textContent = verdict;
      verdictEl.className = 'poker-verdict ' + cls;
      document.getElementById('pokerReason').textContent = reason;
      document.getElementById('pokerScore').textContent =
        `의심 지수 ${pokerSuspicion} / ${pokerQuestions.length} · ${fold ? '폴드 권장' : '콜 권장'}`;

      pokerResultText = `[콜 할까 말까?]\n결과: ${verdict}\n${reason}\n(의심 지수 ${pokerSuspicion}/${pokerQuestions.length})`;

      pokerQuiz.style.display = 'none';
      pokerResult.style.display = 'block';
    }

    function resetPoker() {
      pokerStep = 0;
      pokerSuspicion = 0;
      pokerResultText = '';
      showPokerQuestion();
    }

    function copyPokerResult() {
      if (!pokerResultText) return;
      const url = location.protocol === 'file:' ? '' : location.origin + location.pathname + '?app=poker';
      const text = url ? pokerResultText + '\n' + url : pokerResultText;
      copyToClipboard(text).then((ok) => {
        showToast(ok ? '📋 복사 완료! 톡방에 붙여넣기 하세요' : '📋 길게 눌러서 복사해 주세요');
      });
    }

    function sharePoker() {
      const text = pokerResultText || '홀덤 톡방용 콜/폴드 결정기 발견 ㅋㅋ';
      const url = location.protocol === 'file:' ? '' : location.origin + location.pathname + '?app=poker';
      const shareText = url ? text + '\n' + url : text;

      if (navigator.share) {
        navigator.share({ title: '콜 할까 말까? 🃏', text: shareText }).catch((e) => {
          if (e.name !== 'AbortError') copyToClipboard(shareText).then(() => showToast('📋 복사됨! 톡방에 붙여넣기 하세요'));
        });
        return;
      }
      copyToClipboard(shareText).then((ok) => {
        showToast(ok ? '📋 복사됨! 톡방에 붙여넣기 하세요' : shareText);
      });
    }

    resetPoker();
    bindTap(document.getElementById('pokerYes'), () => answerPoker(true));
    bindTap(document.getElementById('pokerNo'), () => answerPoker(false));
    bindTap(document.getElementById('pokerRetryBtn'), resetPoker);
    bindTap(document.getElementById('pokerCopyBtn'), copyPokerResult);
    bindTap(document.getElementById('pokerShareBtn'), sharePoker);

    // URL에 핑계가 있으면 표시 (공유 링크용)
    const shared = params.get('e');
    if (shared) {
      try {
        currentExcuse = decodeURIComponent(shared);
        excuseBox.textContent = currentExcuse;
        excuseBox.classList.add('has-excuse');
        copyBtn.style.display = 'block';
      } catch {}
    }

    })();
  </script>
</body>
</html>
